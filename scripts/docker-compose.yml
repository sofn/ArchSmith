services:
  mysqldb:
    image: mysql:8
    environment:
      MYSQL_DATABASE: appforge
      MYSQL_ROOT_PASSWORD: 123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  appforge:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      - mysqldb
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - ./logs:/app/logs

volumes:
  mysql-data: