# Development environment specific configuration
server:
  port: 8081
spring:
  profiles:
    active: base,dev
  devtools:
    restart:
      enabled: true  # 启用自动重启
      additional-paths: src/main/java,src/main/resources  # 监听路径
      exclude: "static/**,public/**"  # 排除静态资源
    livereload:
      enabled: true  # 启用LiveReload
      port: 35729   # LiveReload端口
  h2:
    console: # H2 控制台配置
      enabled: true  # 启用控制台
      path: /h2-console  # 访问路径
      settings:
        trace: false  # 关闭跟踪日志（生产环境建议禁用）
        web-allow-others: false  # 禁止远程访问（安全）
  data:
    # redis 配置 - 开发环境mock
    redis:
      host: 192.168.0.3 # 地址
      port: 6380 # 端口
      database: 0 # 数据库索引
      # password: # 开发环境使用 mock server，不需要密码
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# Database configuration - H2 for development
task:
  jdbc:
    master:
      driver: org.h2.Driver
      url: jdbc:h2:file:~/.h2/task;AUTO_SERVER=TRUE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
      username: sa
      password: ""
    slave:
      driver: org.h2.Driver
      url: jdbc:h2:file:~/.h2/task;AUTO_SERVER=TRUE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
      username: sa
      password: ""
user:
  jdbc:
    master:
      driver: org.h2.Driver
      url: jdbc:h2:file:~/.h2/user;AUTO_SERVER=TRUE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
      username: sa
      password: ""
    slave:
      driver: org.h2.Driver
      url: jdbc:h2:file:~/.h2/user;AUTO_SERVER=TRUE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
      username: sa
      password: ""

