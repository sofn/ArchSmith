# Development environment
server:
  port: 8080

spring:
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java,src/main/resources
      exclude: "static/**,public/**"
    livereload:
      enabled: true
      port: 35729
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms
  # Database - PostgreSQL via Testcontainers (auto-configured by InitPostgreSQLServer)
  datasource:
    dynamic:
      datasource:
        user_master:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:5432/archsmith_user
          username: archsmith
          password: archsmith
        user_slave:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:5432/archsmith_user
          username: archsmith
          password: archsmith
        task_master:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:5432/archsmith_task
          username: archsmith
          password: archsmith
        task_slave:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://localhost:5432/archsmith_task
          username: archsmith
          password: archsmith

# OpenTelemetry
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
    metrics:
      endpoint: http://localhost:4318/v1/metrics

arch-smith:
  embedded:
    redis: true
    postgresql: true
    db-init: true
    s3: true
  flyway:
    enabled: false
  monitor:
    enabled: true
  jwt:
    secret: 5/jDAWs7a63GRgjS+uF2mP7dcLwI6GAgxf+Z0+fOAbgMR/jksG5r0v10nDOkrM0btxtb2FAuol8fSzSJis8gIA==
    expire-seconds: 604800
  captcha:
    enabled: false
